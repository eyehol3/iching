  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #fdfdfc;
      --text: #1a1a1a;
      --text-secondary: #6b6b6b;
      --accent: #4a4a4a;
      --border: #e2e2e2;
      --blockquote-bg: transparent;
      --blockquote-border: #c0c0c0;
      --toc-hover: #f5f5f5;
      --font-body: 'Literata', 'Georgia', serif;
      --font-ui: -apple-system, 'Segoe UI', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --text: #d8d8d4;
        --text-secondary: #888880;
        --accent: #a0a098;
        --border: #2a2a28;
        --blockquote-bg: transparent;
        --blockquote-border: #444440;
        --toc-hover: #1a1a18;
      }
    }

    html {
      font-size: 18.5px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-body);
      font-weight: 420;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      min-height: 100vh;
    }

    /* ── Layout ── */

    .container {
      max-width: 620px;
      margin: 0 auto;
      padding: 3rem 1.5rem 6rem;
    }

    /* ── Fade-in ── */

    .fade-in {
      opacity: 0;
      transform: translateY(6px);
      animation: appear 0.5s ease forwards;
    }

    @keyframes appear {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Loading ── */

    #loading {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 60vh;
      font-family: var(--font-ui);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    /* ── Table of Contents (home) ── */

    .home-title {
      text-align: center;
      margin-bottom: 4rem;
      padding-top: 2rem;
    }

    .home-title h1 {
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      margin-bottom: 0.3rem;
    }

    .home-title .subtitle {
      font-size: 1.05rem;
      font-weight: 400;
      font-style: italic;
      color: var(--text-secondary);
    }

    .toc-section {
      margin-bottom: 2.5rem;
    }

    .toc-section h2 {
      font-family: var(--font-ui);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    .toc-list {
      list-style: none;
    }

    .toc-list li {
      border-bottom: 1px solid transparent;
    }

    .toc-list a {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      padding: 0.3rem 0.5rem;
      margin: 0 -0.5rem;
      text-decoration: none;
      color: var(--text);
      border-radius: 4px;
      transition: background 0.15s ease;
    }

    .toc-list a:hover {
      background: var(--toc-hover);
    }

    .toc-num {
      font-size: 0.85rem;
      color: var(--text-secondary);
      min-width: 1.6rem;
      text-align: right;
      flex-shrink: 0;
    }

    .toc-name {
      font-size: 1.05rem;
    }

    .toc-section .toc-list--plain a {
      font-size: 1rem;
      padding: 0.25rem 0.5rem;
    }

    /* Hexagram grid: two columns for the 64 hexagrams */
    .toc-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 2rem;
    }

    @media (max-width: 500px) {
      .toc-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ── Chapter view ── */

    .back-link {
      display: inline-block;
      font-family: var(--font-ui);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      text-decoration: none;
      margin-bottom: 2.5rem;
      transition: color 0.15s ease;
    }

    .back-link:hover {
      color: var(--text);
    }

    .back-link::before {
      content: '←  ';
    }

    /* ── Typography (rendered markdown) ── */

    #content h1 {
      font-size: 2rem;
      font-weight: 600;
      line-height: 1.25;
      margin-bottom: 1.8rem;
      letter-spacing: 0.01em;
    }

    #content h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-top: 3rem;
      margin-bottom: 0.8rem;
    }

    #content h3 {
      font-family: var(--font-ui);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: 2.8rem;
      margin-bottom: 0.6rem;
    }

    #content h4 {
      font-size: 1.1rem;
      font-weight: 600;
      font-style: italic;
      margin-top: 2rem;
      margin-bottom: 0.4rem;
    }

    #content p {
      margin-bottom: 1.3rem;
    }

    #content blockquote {
      margin: 1.6rem 0;
      padding: 0 0 0 1.5rem;
      border-left: 2px solid var(--blockquote-border);
      font-style: italic;
      font-weight: 400;
      font-size: 1.1rem;
      line-height: 2;
      color: var(--text);
    }

    #content blockquote p {
      margin-bottom: 0.4rem;
    }

    #content blockquote p:last-child {
      margin-bottom: 0;
    }

    #content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 3rem 0;
    }

    #content a {
      color: var(--text);
      text-decoration: underline;
      text-decoration-color: var(--border);
      text-underline-offset: 3px;
      transition: text-decoration-color 0.15s;
    }

    #content a:hover {
      text-decoration-color: var(--text);
    }

    #content sup {
      font-size: 0.65em;
      line-height: 0;
    }

    #content strong {
      font-weight: 700;
    }

    #content em {
      font-style: italic;
    }

    #content img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 2rem auto;
    }

    /* Chapter navigation */
    .chapter-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-family: var(--font-ui);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .chapter-nav a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.15s;
    }

    .chapter-nav a:hover {
      color: var(--text);
    }

    /* Language toggle (footer) */
    .lang-toggle {
      text-align: center;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .lang-toggle a {
      font-family: var(--font-ui);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.15s;
    }

    .lang-toggle a:hover {
      color: var(--text);
    }

    /* Error */
    .error {
      text-align: center;
      color: var(--text-secondary);
      padding: 4rem 1rem;
      font-size: 1.1rem;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Print */
    @media print {
      body { font-size: 11pt; }
      .back-link, .chapter-nav, .lang-toggle { display: none; }
    }
  </style>
</head>

          ["\u0425\u0443\u0430\u043d\u044c","\u0420\u043e\u0437\u043f\u043e\u0440\u043e\u0448\u0435\u043d\u043d\u044f"],["\u0426\u0437\u0454","\u041e\u0431\u043c\u0435\u0436\u0435\u043d\u043d\u044f"],
          ["\u0427\u0436\u0443\u043d \u0424\u0443","\u0412\u043d\u0443\u0442\u0440\u0456\u0448\u043d\u044f \u043f\u0440\u0430\u0432\u0434\u0430"],["\u0421\u044f\u043e \u0413\u043e","\u041f\u0435\u0440\u0435\u0432\u0430\u0436\u0430\u043d\u043d\u044f \u043c\u0430\u043b\u043e\u0433\u043e"],
          ["\u0426\u0437\u0456 \u0426\u0437\u0456","\u041f\u0456\u0441\u043b\u044f \u0437\u0430\u0432\u0435\u0440\u0448\u0435\u043d\u043d\u044f"],["\u0412\u0435\u0439 \u0426\u0437\u0456","\u041f\u0435\u0440\u0435\u0434 \u0437\u0430\u0432\u0435\u0440\u0448\u0435\u043d\u043d\u044f\u043c"],

    // Hex file stems (shared between languages — same filenames)
    const HEX_FILES = [
      'ch-ien-the-creative','k-un-the-receptive','chun-difficulty-at-the-beginning',
      'm-ng-youthful-folly','hs-waiting-nourishment','sung-conflict',
      'shih-the-army','pi-holding-together-union','hsiao-ch-u-the-taming-power-of-the-small',
      'l-treading-conduct','t-ai-peace','p-i-standstill-stagnation',
      't-ung-j-n-fellowship-with-men','ta-yu-possession-in-great-measure',
      'ch-ien-modesty','y-enthusiasm','sui-following',
      'ku-work-on-what-has-been-spoiled-decay','lin-approach','kuan-contemplation-view',
      'shih-ho-biting-through','pi-grace','po-splitting-apart',
      'fu-return-the-turning-point','wu-wang-innocence-the-unexpected',
      'ta-ch-u-the-taming-power-of-the-great','i-the-corners-of-the-mouth-providing-nourishment',
      'ta-kuo-preponderance-of-the-great','k-an-the-abysmal-water','li-the-clinging-fire',
      'hsien-influence-wooing','h-ng-duration','tun-retreat',
      'ta-chuang-the-power-of-the-great','chin-progress','ming-i-darkening-of-the-light',
      'chia-j-n-the-family-the-clan','k-uei-opposition','chien-obstruction','hsieh-deliverance',
      'sun-decrease','i-increase','kuai-break-through-resoluteness',
      'kou-coming-to-meet','ts-ui-gathering-together-massing','sh-ng-pushing-upward',
      'k-un-oppression-exhaustion','ching-the-well','ko-revolution-molting','ting-the-caldron',
      'ch-n-the-arousing-shock-thunder','k-n-keeping-still-mountain',
      'chien-development-gradual-progress','kuei-mei-the-marrying-maiden',
      'f-ng-abundance-fullness','l-the-wanderer','sun-the-gentle-penetrating-wind',
      'tui-the-joyous-lake','huan-dispersion-dissolution','chieh-limitation',
      'chung-fu-inner-truth','hsiao-kuo-preponderance-of-the-small',
      'chi-chi-after-completion','wei-chi-before-completion',
    ];

    // ── Build TOC data per language ──

    function buildTOC(lang) {
      const L = LOCALES[lang];
      const toc = {
        frontMatter: L.frontMatter,
        hexagrams: [],
        book2: L.book2,
        appendixes: L.appendixes,
      };
      for (let i = 0; i < 64; i++) {
        const num = String(i + 1).padStart(2, '0');
        toc.hexagrams.push({
          num: i + 1,
          name: L.hexNames[i][0],
          meaning: L.hexNames[i][1],
          hexFile: `hex-${num}-${HEX_FILES[i]}`,
          comFile: `com-${num}-${HEX_FILES[i]}`,
        });
      }
      return toc;
    }

    // Build ordered file list for prev/next navigation
    function buildAllFiles(toc) {
      return [
        ...toc.frontMatter.map(f => f.file),
        ...toc.hexagrams.map(h => h.hexFile),
        ...toc.book2.map(f => f.file),
        ...toc.hexagrams.map(h => h.comFile),
        ...toc.appendixes.map(f => f.file),
      ];
    }

    // ── Language detection ──

    const SUPPORTED_LANGS = ['en', 'ua'];
    const DEFAULT_LANG = 'en';

    function detectLang() {
      // 1. Check localStorage for saved preference
      try {
        const saved = localStorage.getItem('lang');
        if (saved && SUPPORTED_LANGS.includes(saved)) return saved;
      } catch(e) {}
      // 2. Check Telegram WebApp user language
      try {
        const tg = Telegram.WebApp;
        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
          const tgLang = tg.initDataUnsafe.user.language_code;
          if (tgLang === 'uk') return 'ua';
        }
      } catch(e) {}
      return DEFAULT_LANG;
    }

    // ── State ──

    let currentLang = DEFAULT_LANG;
    let currentFile = null;
    let currentTOC = null;
    let currentAllFiles = null;
    let currentKnownFiles = null;

    function setLang(lang) {
      currentLang = SUPPORTED_LANGS.includes(lang) ? lang : DEFAULT_LANG;
      currentTOC = buildTOC(currentLang);
      currentAllFiles = buildAllFiles(currentTOC);
      currentKnownFiles = new Set(currentAllFiles);
      document.documentElement.lang = currentLang === 'ua' ? 'uk' : 'en';
      try { localStorage.setItem('lang', currentLang); } catch(e) {}
    }

    // ── Rendering ──

    function renderHome() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('chapter').style.display = 'none';
      const home = document.getElementById('home');
      home.style.display = 'block';

      const L = LOCALES[currentLang];
      const toc = currentTOC;

      let html = '<div class="fade-in">';
      html += `<div class="home-title"><h1>${L.title}</h1><div class="subtitle">${L.subtitle}</div></div>`;

      // Front Matter
      html += `<div class="toc-section"><h2>${L.sections.frontMatter}</h2><ul class="toc-list toc-list--plain">`;
      for (const item of toc.frontMatter) {
        html += `<li><a href="#${currentLang}/${item.file}"><span class="toc-name">${item.title}</span></a></li>`;
      }
      html += '</ul></div>';

      // The 64 Hexagrams
      html += `<div class="toc-section"><h2>${L.sections.bookI}</h2><div class="toc-grid"><ul class="toc-list">`;
      for (let i = 0; i < 64; i++) {
        if (i === 32) html += '</ul><ul class="toc-list">';
        const h = toc.hexagrams[i];
        html += `<li><a href="#${currentLang}/${h.hexFile}"><span class="toc-num">${h.num}.</span><span class="toc-name">${h.name}</span></a></li>`;
      }
      html += '</ul></div></div>';

      // Book II
      html += `<div class="toc-section"><h2>${L.sections.bookII}</h2><ul class="toc-list toc-list--plain">`;
      for (const item of toc.book2) {
        html += `<li><a href="#${currentLang}/${item.file}"><span class="toc-name">${item.title}</span></a></li>`;
      }
      html += '</ul></div>';

      // Commentaries
      html += `<div class="toc-section"><h2>${L.sections.bookIII}</h2>`;
      html += '<div class="toc-grid"><ul class="toc-list">';
      for (let i = 0; i < 64; i++) {
        if (i === 32) html += '</ul><ul class="toc-list">';
        const h = toc.hexagrams[i];
        html += `<li><a href="#${currentLang}/${h.comFile}"><span class="toc-num">${h.num}.</span><span class="toc-name">${h.name}</span></a></li>`;
      }
      html += '</ul></div></div>';

      // Appendixes
      html += `<div class="toc-section"><h2>${L.sections.appendixes}</h2><ul class="toc-list toc-list--plain">`;
      for (const item of toc.appendixes) {
        html += `<li><a href="#${currentLang}/${item.file}"><span class="toc-name">${item.title}</span></a></li>`;
      }
      html += '</ul></div>';

      // Language toggle
      html += `<div class="lang-toggle"><a href="#${L.otherLang}/">${L.langToggleLabel}</a></div>`;

      html += '</div>';
      home.innerHTML = html;
      document.title = `${L.title} \u2014 ${L.subtitle}`;
      window.scrollTo(0, 0);
    }

    async function renderChapter(file) {
      document.getElementById('home').style.display = 'none';
      document.getElementById('loading').style.display = 'flex';
      document.getElementById('loading').textContent = LOCALES[currentLang].loading;
      const chapterEl = document.getElementById('chapter');
      const contentEl = document.getElementById('content');
      const navEl = document.getElementById('chapter-nav');
      chapterEl.style.display = 'none';

      const L = LOCALES[currentLang];

      // Update back link
      document.getElementById('back-link').href = `#${currentLang}/`;
      document.getElementById('back-link').textContent = L.contents;

      try {
        const response = await fetch(`${currentLang}/${file}.md`);
        if (!response.ok) throw new Error(L.errorLoad);

        let markdown = await response.text();

        marked.setOptions({ breaks: false, gfm: true });

        const renderer = new marked.Renderer();
        renderer.image = function({ href, title, text }) {
          return `<img src="${href}" alt="${text || ''}" title="${title || ''}" onerror="this.style.display='none'" loading="lazy">`;
        };

        // Clean docsify-style links: href="#/filename?id=anchor" → href="#anchor"
        markdown = markdown.replace(/href="#\/[^"]*\?id=([^"]*)"/g, 'href="#$1"');

        const html = marked.parse(markdown, { renderer });

        document.getElementById('loading').style.display = 'none';
        contentEl.innerHTML = html;
        contentEl.className = 'fade-in';

        // Build prev/next nav
        const idx = currentAllFiles.indexOf(file);
        let navHtml = '';
        if (idx > 0) {
          navHtml += `<a href="#${currentLang}/${currentAllFiles[idx - 1]}">${L.previous}</a>`;
        } else {
          navHtml += '<span></span>';
        }
        if (idx < currentAllFiles.length - 1 && idx >= 0) {
          navHtml += `<a href="#${currentLang}/${currentAllFiles[idx + 1]}">${L.next}</a>`;
        }
        navEl.innerHTML = navHtml;
        navEl.className = 'chapter-nav fade-in';

        chapterEl.style.display = 'block';

        // Update page title
        const h1 = contentEl.querySelector('h1');
        if (h1) {
          document.title = h1.textContent + ` \u2014 ${L.title}`;
        }

        window.scrollTo(0, 0);
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        contentEl.innerHTML = `<div class="error"><p>${L.errorLoad}</p><p style="font-size:0.85rem;margin-top:0.5rem">${err.message}</p></div>`;
        navEl.innerHTML = '';
        chapterEl.style.display = 'block';
      }
    }

    // ── Router ──

    function parseLangAndFile(hash) {
      // Hash format: "en/hex-01-..." or "ua/hex-01-..." or "en/" (home) or just ""
      for (const lang of SUPPORTED_LANGS) {
        if (hash === lang || hash === lang + '/') {
          return { lang, file: null };
        }
        if (hash.startsWith(lang + '/')) {
          return { lang, file: hash.slice(lang.length + 1) || null };
        }
      }
      // No language prefix — could be a legacy URL or bare file
      return { lang: null, file: hash || null };
    }

    function route() {
      // Strip Telegram launch params from hash
      const rawHash = window.location.hash.slice(1);
      if (rawHash && rawHash.indexOf('tgWebApp') !== -1) {
        history.replaceState(null, '', location.pathname + location.search);
      }

      // Convert ?file= query param to #hash
      const params = new URLSearchParams(window.location.search);
      const fromQuery = params.get('file');
      if (fromQuery) {
        history.replaceState(null, '', location.pathname + '#' + fromQuery);
      }

      const hash = window.location.hash.slice(1);
      const parsed = parseLangAndFile(hash);

      // Determine language
      let lang = parsed.lang;
      if (!lang) {
        // Legacy URL without lang prefix — redirect with detected or current lang
        if (parsed.file) {
          // Legacy file link: add current language prefix
          history.replaceState(null, '', location.pathname + '#' + currentLang + '/' + parsed.file);
          lang = currentLang;
        } else {
          lang = currentLang;
        }
      }

      // Switch language if needed
      if (lang !== currentLang) {
        setLang(lang);
      }

      const file = parsed.file;

      if (!file) {
        currentFile = null;
        renderHome();
        return;
      }

      if (currentKnownFiles.has(file)) {
        if (file !== currentFile) {
          currentFile = file;
          renderChapter(file);
        }
        return;
      }

      // In-page anchor (footnote)
      const el = document.getElementById(file);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth' });
      }
    }

    // ── Init ──

    // Detect initial language from hash or Telegram
    (function init() {
      const hash = window.location.hash.slice(1);
      const parsed = parseLangAndFile(hash);
      const initialLang = parsed.lang || detectLang();
      setLang(initialLang);
    })();

    window.addEventListener('hashchange', route);
    try { route(); } catch(e) {
      document.getElementById('loading').textContent = 'Error: ' + e.message;
    }
  </script>
